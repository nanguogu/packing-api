services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: packing_app
    environment:
      DATABASE_URL: postgresql://packing:${POSTGRES_PASSWORD:-packing123}@postgres:5432/packing_db
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:15
    container_name: packing_postgres
    environment:
      POSTGRES_USER: packing
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-packing123}
      POSTGRES_DB: packing_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U packing -d packing_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: packing_redis
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
